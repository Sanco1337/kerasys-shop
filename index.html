<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kerasys Do'kon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F9FF;
  --bg2: #FFFFFF;
  --bg3: #EEF0FF;
  --card: #FFFFFF;
  --card2: #F0F2FF;
  --accent: #5B52E0;
  --accent2: #E84A6A;
  --accent3: #2DC46A;
  --accent4: #F0941E;
  --text: #1A1A2E;
  --text2: #6B6B8A;
  --border: rgba(91,82,224,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(91,82,224,0.08);
  --shadow-lg: 0 8px 32px rgba(91,82,224,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #FFFFFF 0%, #F0F2FF 100%);
  padding: 14px 16px 0;
  position: sticky; top:0; z-index:100;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:36px; height:36px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo-text { font-size:18px; font-weight:900; color:var(--text); letter-spacing:-0.5px; }
.logo-text span { color:var(--accent); }
.header-right { display:flex; gap:8px; }
.hbtn {
  display:flex; align-items:center; gap:6px;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:8px 14px;
  color:var(--text); font-family:'Nunito',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.hbtn:active { transform:scale(0.95); background:var(--accent); color:#fff; }
.hbtn.admin { padding:8px 10px; }
.cart-badge {
  background:var(--accent2); color:#fff;
  border-radius:20px; min-width:18px; height:18px;
  font-size:10px; font-weight:800;
  display:none; align-items:center; justify-content:center; padding:0 4px;
}
.cart-badge.on { display:flex; }

/* CATS */
.cats { display:flex; gap:8px; padding-bottom:12px; overflow-x:auto; scrollbar-width:none; }
.cats::-webkit-scrollbar { display:none; }
.cat-pill {
  white-space:nowrap; padding:7px 16px;
  border-radius:20px; border:1.5px solid var(--border);
  background:transparent; color:var(--text2);
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.cat-pill.on { background:var(--accent); border-color:var(--accent); color:#fff; }

/* MAIN */
.main { padding:16px 12px 100px; }
.page-title { font-size:22px; font-weight:900; margin-bottom:4px; }
.page-sub { font-size:12px; color:var(--text2); margin-bottom:16px; }

/* GRID */
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.p-card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid var(--border); overflow:hidden;
  transition:transform 0.15s, box-shadow 0.15s;
  position:relative;
  box-shadow: var(--shadow);
}
.p-card:active { transform:scale(0.96); }

/* IMAGE */
.p-img {
  width:100%; aspect-ratio:1;
  background:var(--card2);
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.p-img img {
  width:100%; height:100%;
  object-fit:cover;
  position:absolute; inset:0;
  display:block;
}
.p-img .fallback { font-size:52px; line-height:1; }
.p-img img.loaded ~ .fallback { display:none; }
.p-img img.errored { display:none; }

.p-badge {
  position:absolute; top:8px; left:8px;
  background:var(--accent2); color:#fff;
  font-size:9px; font-weight:800; padding:3px 8px;
  border-radius:20px; z-index:3; text-transform:uppercase;
}
.p-body { padding:10px 12px 12px; }
.p-name { font-size:13px; font-weight:800; line-height:1.3; margin-bottom:2px; }
.p-desc { font-size:11px; color:var(--text2); margin-bottom:10px; line-height:1.4; }
.p-foot { display:flex; align-items:center; justify-content:space-between; }
.p-price { font-size:14px; font-weight:900; color:var(--accent); }
.add-btn {
  width:30px; height:30px; border-radius:9px;
  background:var(--accent); color:#fff; border:none;
  font-size:20px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.1s;
}
.add-btn:active { transform:scale(0.88); }
.qty-wrap { display:none; align-items:center; gap:6px; }
.qty-wrap.on { display:flex; }
.q-btn {
  width:26px; height:26px; border-radius:8px;
  border:1.5px solid var(--border); background:var(--card2);
  color:var(--text); font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.q-num { font-size:14px; font-weight:800; min-width:18px; text-align:center; }
.inactive-badge {
  position:absolute; inset:0; background:rgba(255,255,255,0.85);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800; color:var(--text); z-index:5;
  border-radius:var(--radius);
}

/* LOADING */
.loading { text-align:center; padding:60px 20px; color:var(--text2); grid-column:1/-1; }
.spin { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* OVERLAY + SHEET */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.overlay.on { opacity:1; pointer-events:all; }
.sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg2); border-radius:24px 24px 0 0;
  z-index:201; transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height:92vh; display:flex; flex-direction:column;
  border-top:1px solid var(--border);
  box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
}
.sheet.on { transform:translateY(0); }
.s-handle { width:40px; height:4px; background:rgba(0,0,0,0.12); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
.s-head { padding:14px 20px 0; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.s-title { font-size:20px; font-weight:900; }
.s-close { background:var(--card2); border:none; width:30px; height:30px; border-radius:8px; color:var(--text2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.s-body { flex:1; overflow-y:auto; padding:14px 20px; scrollbar-width:none; }
.s-body::-webkit-scrollbar { display:none; }
.s-foot { padding:12px 20px 20px; flex-shrink:0; border-top:1px solid var(--border); background:var(--bg2); }

/* CART */
.empty { text-align:center; padding:50px 0; color:var(--text2); }
.empty-icon { font-size:56px; margin-bottom:12px; }
.empty-txt { font-size:15px; font-weight:700; }
.c-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.c-thumb {
  width:52px; height:52px; border-radius:12px;
  background:var(--card2); flex-shrink:0;
  overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center; font-size:26px;
}
.c-thumb img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.c-thumb img.errored { display:none; }
.c-info { flex:1; min-width:0; }
.c-name { font-size:13px; font-weight:800; }
.c-price { font-size:12px; color:var(--accent); font-weight:700; margin-top:2px; }
.c-qty { display:flex; align-items:center; gap:8px; }
.cq-btn { width:28px; height:28px; border-radius:8px; border:1.5px solid var(--border); background:var(--card2); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cq-n { font-size:14px; font-weight:800; }
.total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.total-lbl { font-size:14px; color:var(--text2); font-weight:700; }
.total-val { font-size:26px; font-weight:900; color:var(--accent); }
.big-btn {
  width:100%; padding:15px; border:none; border-radius:14px;
  font-family:'Nunito',sans-serif; font-size:16px; font-weight:800;
  cursor:pointer; transition:transform 0.1s, opacity 0.2s;
}
.big-btn:active { transform:scale(0.97); }
.big-btn.primary { background:linear-gradient(135deg,var(--accent),#7B72E8); color:#fff; box-shadow: 0 4px 16px rgba(91,82,224,0.3); }
.big-btn.secondary { background:var(--card2); color:var(--text2); margin-top:8px; }
.big-btn:disabled { opacity:0.35; cursor:not-allowed; }

/* ORDER FORM */
.f-group { margin-bottom:14px; }
.f-label { font-size:12px; color:var(--text2); font-weight:700; margin-bottom:6px; display:block; text-transform:uppercase; letter-spacing:0.5px; }
.f-input, .f-select {
  width:100%; padding:12px 14px; border-radius:12px;
  border:1.5px solid var(--border); background:var(--card);
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:600;
  color:var(--text); outline:none; transition:border-color 0.2s;
}
.f-input:focus, .f-select:focus { border-color:var(--accent); }
.f-input::placeholder { color:var(--text2); }
.f-select option { background:var(--card); }
.f-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* ADMIN */
.adm-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.a-tab {
  flex:1; min-width:0; padding:9px 6px; border-radius:10px;
  border:1.5px solid var(--border); background:transparent;
  font-size:12px; font-weight:800; cursor:pointer; color:var(--text2);
  transition:all 0.2s; white-space:nowrap;
}
.a-tab.on { background:var(--accent); border-color:var(--accent); color:#fff; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.stat-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:14px; box-shadow: var(--shadow); }
.stat-icon { font-size:24px; margin-bottom:6px; }
.stat-val { font-size:22px; font-weight:900; color:var(--accent); }
.stat-lbl { font-size:11px; color:var(--text2); font-weight:700; margin-top:2px; }

/* ADMIN PRODUCT LIST */
.adm-p {
  display:flex; align-items:center; gap:10px;
  background:var(--card); border-radius:12px;
  border:1px solid var(--border); padding:10px 12px; margin-bottom:8px;
  box-shadow: var(--shadow);
}
.adm-p-thumb {
  width:46px; height:46px; border-radius:10px;
  background:var(--card2); flex-shrink:0; overflow:hidden;
  position:relative; display:flex; align-items:center; justify-content:center; font-size:22px;
}
.adm-p-thumb img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.adm-p-thumb img.errored { display:none; }
.adm-p-info { flex:1; min-width:0; }
.adm-p-name { font-size:13px; font-weight:800; }
.adm-p-meta { font-size:11px; color:var(--text2); margin-top:2px; }
.adm-p-price { color:var(--accent); font-weight:700; }
.adm-acts { display:flex; gap:6px; flex-shrink:0; }
.ia-btn {
  width:30px; height:30px; border-radius:8px; border:none;
  cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
  transition:transform 0.1s;
}
.ia-btn:active { transform:scale(0.9); }
.ia-edit { background:rgba(91,82,224,0.1); color:var(--accent); }
.ia-toggle { background:rgba(45,196,106,0.1); color:var(--accent3); }
.ia-toggle.off { background:rgba(232,74,106,0.1); color:var(--accent2); }
.ia-del { background:rgba(232,74,106,0.1); color:var(--accent2); }

/* ORDERS */
.ord-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:14px; margin-bottom:10px; box-shadow: var(--shadow); }
.ord-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.ord-num { font-size:12px; color:var(--text2); font-weight:700; }
.ord-status {
  font-size:11px; font-weight:800; padding:4px 10px;
  border-radius:20px; cursor:pointer;
}
.ord-status.yangi { background:rgba(91,82,224,0.12); color:var(--accent); }
.ord-status.jarayonda { background:rgba(240,148,30,0.12); color:var(--accent4); }
.ord-status.yetkazildi { background:rgba(45,196,106,0.12); color:var(--accent3); }
.ord-status.bekor { background:rgba(232,74,106,0.12); color:var(--accent2); }
.ord-items { font-size:13px; font-weight:600; line-height:1.7; margin-bottom:8px; }
.ord-total { font-size:15px; font-weight:900; color:var(--accent); margin-bottom:6px; }
.ord-info { font-size:12px; color:var(--text2); line-height:1.7; }
.status-picker { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.sp-btn { padding:6px 12px; border-radius:20px; border:none; font-size:11px; font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif; }

/* TOAST */
.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--card); color:var(--text);
  border:1px solid var(--border);
  padding:11px 22px; border-radius:20px;
  font-size:13px; font-weight:700; z-index:500;
  transition:transform 0.3s; white-space:nowrap;
  box-shadow: var(--shadow-lg);
}
.toast.on { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-text">Kerasys<span>Shop</span></div>
    </div>
    <div class="header-right">
      <button class="hbtn admin" id="adminBtn" style="display:none" onclick="openAdmin()">⚙️</button>

<!-- CART SHEET -->

  <div class="s-head">

    <div id="aOrders" style="display:none"></div>

<script type="module">

const STATUS_LABELS={yangi:'🟣 Yangi',jarayonda:'🟡 Jarayonda',yetkazildi:'🟢 Yetkazildi',bekor:'🔴 Bekor'};

const fmt=n=>Number(n).toLocaleString('uz-UZ')+' so\'m';

window.toast=toast;

/* ── CATEGORIES ── */
function renderCats(){
  $('catTabs').innerHTML=CATS.map(c=>
    `<button class="cat-pill ${c.id===currentCat?'on':''}" onclick="setCat('${c.id}')">${c.label}</button>`
  ).join('');
}
window.setCat=id=>{
  currentCat=id;
  $('pgTitle').textContent=id==='all'?'Barcha mahsulotlar':CATS.find(c=>c.id===id).label;
  renderCats(); renderProducts();
};

/* ── PRODUCTS ── */
function makeImg(url,icon,cls=''){
  if(!url) return `<span class="fallback">${icon}</span>`;
  return `<img src="${url}" alt="" class="${cls}"
    onload="this.classList.add('loaded')"
    onerror="this.classList.add('errored')">
    <span class="fallback" style="position:absolute">${icon}</span>`;
}

function renderProducts(){
  const list=currentCat==='all'?products:products.filter(p=>p.cat===currentCat);
  const el=$('pgGrid');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2);font-weight:700">Mahsulot topilmadi</div>';return;}
  el.innerHTML=`<div class="grid">${list.map(p=>{
    const qty=cart[p.id]?.qty||0;
    const icon=ICONS[p.cat]||'📦';
    const active=p.active!==false;
    return `<div class="p-card" style="${!active?'opacity:0.5':''}">
      ${!active?'<div class="inactive-badge">Nofaol</div>':''}
      <div class="p-img">
        ${p.img
          ?`<img src="${p.img}" alt="${p.name}"
              onload="this.nextElementSibling.style.display='none'"
              onerror="this.style.display='none'">
            <span class="fallback">${icon}</span>`
          :`<span class="fallback">${icon}</span>`}
        ${p.badge?`<div class="p-badge">${p.badge}</div>`:''}
      </div>
      <div class="p-body">
        <div class="p-name">${p.name}</div>
        <div class="p-desc">${p.desc||'&nbsp;'}</div>
        <div class="p-foot">
          <div>
            <div class="p-price">${fmt(p.price)}</div>
            ${p.oldPrice?`<div style="font-size:10px;color:var(--text2);text-decoration:line-through">${fmt(p.oldPrice)}</div>`:''}
          </div>
          ${!active?'':(qty===0
            ?`<button class="add-btn" onclick="addItem('${p.id}')">+</button>`
            :`<div class="qty-wrap on">
                <button class="q-btn" onclick="rmItem('${p.id}')">−</button>
                <span class="q-num">${qty}</span>
                <button class="q-btn" onclick="addItem('${p.id}')">+</button>
              </div>`)}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

onSnapshot(collection(db,'products'),snap=>{
  products=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderProducts();
  if(isAdmin) loadAdminProducts();
});

/* ── CART ── */
window.addItem=id=>{
  const p=products.find(x=>x.id===id);
  if(!p||p.active===false)return;
  if(!cart[id])cart[id]={name:p.name,price:p.price,icon:ICONS[p.cat]||'📦',img:p.img||'',qty:0};
  cart[id].qty++;
  updateCartUI(); renderProducts();
  toast(`✓ ${p.name} qo'shildi`);
};
window.rmItem=id=>{
  if(!cart[id])return;
  cart[id].qty--;
  if(cart[id].qty<=0)delete cart[id];
  updateCartUI(); renderProducts();
};

function updateCartUI(){
  const cnt=Object.values(cart).reduce((s,i)=>s+i.qty,0);
  const tot=Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);
  const el=$('badge');
  el.textContent=cnt; el.classList.toggle('on',cnt>0);
  $('totalVal').textContent=fmt(tot);
  $('orderBtn').disabled=cnt===0;
}

window.openCart=()=>{
  renderCartBody();
  $('overlay').classList.add('on');
  $('cartSheet').classList.add('on');
};

function renderCartBody(){
  const items=Object.entries(cart);
  const b=$('cartBody');
  if(!items.length){b.innerHTML='<div class="empty"><div class="empty-icon">🛒</div><div class="empty-txt">Savat bo\'sh</div></div>';return;}
  b.innerHTML=items.map(([id,it])=>`
    <div class="c-item">
      <div class="c-thumb">
        ${it.img?`<img src="${it.img}" onerror="this.classList.add('errored')">`:''}
        ${it.icon}
      </div>
      <div class="c-info">
        <div class="c-name">${it.name}</div>
        <div class="c-price">${fmt(it.price*it.qty)}</div>
      </div>
      <div class="c-qty">
        <button class="cq-btn" onclick="cRm('${id}')">−</button>
        <span class="cq-n">${it.qty}</span>
        <button class="cq-btn" onclick="cAdd('${id}')">+</button>
      </div>
    </div>`).join('');
}
window.cAdd=id=>{addItem(id);renderCartBody();};
window.cRm=id=>{rmItem(id);renderCartBody();};

window.closeAll=()=>{
  $('overlay').classList.remove('on');
  ['cartSheet','orderSheet','adminSheet'].forEach(id=>$(id).classList.remove('on'));
};
window.toOrder=()=>{
  $('cartSheet').classList.remove('on');
  $('orderSheet').classList.add('on');
};
window.backToCart=()=>{
  $('orderSheet').classList.remove('on');
  $('cartSheet').classList.add('on');
  renderCartBody();
};

window.submitOrder=async()=>{
  const name=g('oName'),phone=g('oPhone'),addr=g('oAddr'),note=g('oNote');
  if(!name||!phone||!addr){toast('❗ Ism, telefon va manzil kiritilishi shart');return;}
  const items=Object.values(cart);
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  try{
    await addDoc(collection(db,'orders'),{
      name,phone,addr,note,
      telegram:tgUser?`@${tgUser.username||tgUser.first_name}`:'—',
      items:items.map(i=>({name:i.name,price:i.price,qty:i.qty})),
      total, status:'yangi', createdAt:new Date()
    });
    cart={}; updateCartUI(); renderProducts(); closeAll();
    toast('🎉 Buyurtma qabul qilindi!');
    ['oName','oPhone','oAddr','oNote'].forEach(id=>$(id).value='');
  }catch(e){toast('❌ Xatolik: '+e.message);}
};

/* ── ADMIN ── */
window.openAdmin=()=>{
  $('overlay').classList.add('on');
  $('adminSheet').classList.add('on');
  loadStats();
};

let currentATab='stats';
window.aTab=(name,btn)=>{
  currentATab=name;
  document.querySelectorAll('.a-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['aStats','aProducts','aOrders','aAdd'].forEach(id=>$(id).style.display='none');
  $('a'+name.charAt(0).toUpperCase()+name.slice(1)).style.display='block';
  if(name==='orders')loadAdminOrders();
  if(name==='products')loadAdminProducts();
  if(name==='stats')loadStats();
};

async function loadStats(){
  const el=$('aStats');
  try{
    const pSnap=await getDocs(collection(db,'products'));
    const oSnap=await getDocs(collection(db,'orders'));
    const orders=oSnap.docs.map(d=>d.data());
    const total=orders.reduce((s,o)=>s+(o.total||0),0);
    const today=new Date().toDateString();
    const todayOrds=orders.filter(o=>o.createdAt?.toDate?.().toDateString()===today);
    const todayTotal=todayOrds.reduce((s,o)=>s+(o.total||0),0);
    const active=pSnap.docs.filter(d=>d.data().active!==false).length;
    el.innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-val">${pSnap.size}</div><div class="stat-lbl">Jami mahsulot</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">${active}</div><div class="stat-lbl">Faol mahsulot</div></div>
        <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-val">${orders.length}</div><div class="stat-lbl">Jami buyurtma</div></div>
        <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val">${todayOrds.length}</div><div class="stat-lbl">Bugungi buyurtma</div></div>
        <div class="stat-card" style="grid-column:1/-1"><div class="stat-icon">💰</div><div class="stat-val" style="font-size:18px">${fmt(total)}</div><div class="stat-lbl">Jami savdo</div></div>
        <div class="stat-card" style="grid-column:1/-1"><div class="stat-icon">📈</div><div class="stat-val" style="font-size:18px">${fmt(todayTotal)}</div><div class="stat-lbl">Bugungi savdo</div></div>
      </div>`;
  }catch(e){el.innerHTML='<div style="color:var(--text2);padding:20px">Xatolik: '+e.message+'</div>';}
}

function loadAdminProducts(){
  const el=$('aProducts');
  if(!products.length){el.innerHTML='<div style="color:var(--text2);text-align:center;padding:20px;font-weight:700">Mahsulot yo\'q</div>';return;}
  el.innerHTML=products.map(p=>{
    const active=p.active!==false;
    return `<div class="adm-p">
      <div class="adm-p-thumb">
        ${p.img?`<img src="${p.img}" onerror="this.classList.add('errored')">`:''}
        ${ICONS[p.cat]||'📦'}
      </div>
      <div class="adm-p-info">
        <div class="adm-p-name">${p.name}</div>
        <div class="adm-p-meta"><span class="adm-p-price">${fmt(p.price)}</span> · ${active?'✅ Faol':'❌ Nofaol'}</div>
      </div>
      <div class="adm-acts">
        <button class="ia-btn ia-edit" onclick="editP('${p.id}')" title="Tahrirlash">✏️</button>
        <button class="ia-btn ia-toggle ${active?'':'off'}" onclick="toggleP('${p.id}',${active})" title="${active?'O\'chirish':'Yoqish'}">${active?'👁':'🚫'}</button>
        <button class="ia-btn ia-del" onclick="delP('${p.id}')" title="O'chirish">🗑</button>
      </div>
    </div>`;
  }).join('');
}

let ordersUnsub=null;
function loadAdminOrders(){
  const el=$('aOrders');
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  if(ordersUnsub)ordersUnsub();
  ordersUnsub=onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    if(snap.empty){el.innerHTML='<div style="color:var(--text2);text-align:center;padding:20px;font-weight:700">Buyurtma yo\'q</div>';return;}
    el.innerHTML=snap.docs.map(d=>{
      const o=d.data(),oid=d.id;
      const date=o.createdAt?.toDate?o.createdAt.toDate().toLocaleString('uz-UZ'):'—';
      const st=o.status||'yangi';
      return `<div class="ord-card">
        <div class="ord-top">
          <span class="ord-num">📄 ${oid.slice(0,8)}</span>
          <span class="ord-status ${st}">${STATUS_LABELS[st]||st}</span>
        </div>
        <div class="ord-items">${o.items.map(i=>`${i.name} ×${i.qty}`).join('<br>')}</div>
        <div class="ord-total">${fmt(o.total)}</div>
        <div class="ord-info">👤 ${o.name} · 📱 ${o.phone}<br>📍 ${o.addr}<br>✈️ ${o.telegram}<br>🕐 ${date}${o.note?'<br>💬 '+o.note:''}</div>
        <div class="status-picker">
          ${STATUSES.map(s=>`<button class="sp-btn" style="background:${s===st?'var(--accent)':'var(--card2)'};color:${s===st?'#fff':'var(--text2)'}" onclick="setStatus('${oid}','${s}')">${STATUS_LABELS[s]}</button>`).join('')}
        </div>
      </div>`;
    }).join('');
  });
}

window.setStatus=async(id,status)=>{
  await updateDoc(doc(db,'orders',id),{status});
  toast(`Status: ${STATUS_LABELS[status]}`);
};

window.toggleP=async(id,active)=>{
  await updateDoc(doc(db,'products',id),{active:!active});
  toast(active?'❌ Mahsulot nofaol qilindi':'✅ Mahsulot faollashtirildi');
};

window.editP=id=>{
  const p=products.find(x=>x.id===id);
  if(!p)return;
  $('editId').value=id;
  $('pName').value=p.name;
  $('pDesc').value=p.desc||'';
  $('pPrice').value=p.price;
  $('pCat').value=p.cat;
  $('pImg').value=p.img||'';
  $('pBadge').value=p.badge||'';
  $('pOldPrice').value=p.oldPrice||'';
  $('cancelEdit').style.display='block';
  aTab('add',document.querySelectorAll('.a-tab')[3]);
};

window.cancelEditFn=()=>{
  $('editId').value='';
  ['pName','pDesc','pPrice','pImg','pBadge','pOldPrice'].forEach(id=>$(id).value='');
  $('pCat').value='kukun';
  $('cancelEdit').style.display='none';
  aTab('products',document.querySelectorAll('.a-tab')[1]);
};

window.delP=async id=>{
  if(!confirm('Mahsulotni o\'chirishni tasdiqlaysizmi?'))return;
  await deleteDoc(doc(db,'products',id));
  toast('🗑 O\'chirildi');
};

window.saveProduct=async()=>{
  const name=g('pName'),price=parseInt($('pPrice').value);
  if(!name||!price){toast('❗ Nom va narx kiritilishi shart');return;}
  const data={
    name,desc:g('pDesc'),price,
    cat:$('pCat').value,
    img:g('pImg'),badge:g('pBadge'),
    oldPrice:parseInt($('pOldPrice').value)||0,
    active:true
  };
  const editId=$('editId').value;
  try{
    if(editId){await updateDoc(doc(db,'products',editId),data);toast('✅ Yangilandi');}
    else{await addDoc(collection(db,'products'),data);toast('✅ Qo\'shildi');}
    cancelEditFn();
  }catch(e){toast('❌ Xatolik: '+e.message);}
};

/* INIT */
renderCats(); updateCartUI();
</script>
</body>
</html>
