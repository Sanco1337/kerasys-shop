<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerasys Premium Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --accent:#22c55e;
  --accent2:#4ade80;
  --text:#f9fafb;
  --text2:#9ca3af;
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  backdrop-filter:blur(10px);
}
.logo{
  font-weight:900;
  font-size:20px;
}
.logo span{color:var(--accent);}
.btn{
  background:rgba(255,255,255,0.05);
  border:none;
  color:white;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:14px;
}

/* PRODUCT */
.card{
  background:linear-gradient(145deg,#111827,#020617);
  border-radius:var(--radius);
  padding:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:.2s;
}
.card:active{transform:scale(0.96);}

.img{
  width:100%;
  aspect-ratio:1;
  border-radius:14px;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.name{
  font-weight:700;
  margin-top:8px;
}
.price{
  color:var(--accent);
  font-weight:900;
  margin-top:4px;
}

.add{
  margin-top:8px;
  width:100%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  padding:10px;
  border-radius:12px;
  color:black;
  font-weight:800;
  cursor:pointer;
}

/* CART BUTTON */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  padding:14px 20px;
  border-radius:20px;
  font-weight:900;
  box-shadow:0 10px 30px rgba(34,197,94,0.5);
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">Kerasys<span>Shop</span></div>
  <button class="btn">👤</button>
</div>

<div class="grid" id="products"></div>

<div class="cart">🛒 0</div>

<script>
const products=[
  {name:"Kerasys Shampoo",price:25000},
  {name:"Ariel Kukun",price:45000},
  {name:"Yumos Soft",price:30000},
  {name:"Palmolive Soap",price:12000},
];

const container=document.getElementById('products');

function render(){
  container.innerHTML=products.map(p=>`
    <div class="card">
      <div class="img">🧴</div>
      <div class="name">${p.name}</div>
      <div class="price">${p.price.toLocaleString()} so'm</div>
      <button class="add">Qo'shish</button>
    </div>
  `).join('');
}

render();
</script>

</body>
</html>
