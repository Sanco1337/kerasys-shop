<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerasys Premium Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#22c55e;
  --accent2:#4ade80;
  --text:#f9fafb;
  --text2:#9ca3af;
}
body{margin:0;font-family:'Inter';background:var(--bg);color:var(--text);}
.header{display:flex;justify-content:space-between;padding:16px;}
.logo{font-weight:900;font-size:20px;}
.logo span{color:var(--accent);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;}
.card{background:var(--card);padding:12px;border-radius:16px;}
.img{aspect-ratio:1;background:#111;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.price{color:var(--accent);font-weight:900;}
.add{width:100%;margin-top:6px;padding:10px;border:none;border-radius:10px;background:var(--accent);font-weight:700;}
.cart{position:fixed;bottom:20px;right:20px;background:var(--accent);padding:12px 18px;border-radius:20px;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Kerasys<span>Shop</span></div>
</div>

<div class="grid" id="products"></div>
<div class="cart" id="cartBtn">🛒 0</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* SENING FIREBASE */
const firebaseConfig = {
  apiKey:"AIzaSyCaS_-p9gxwN2O64WoYLlRERisq2s7CEPs",
  authDomain:"kerasys-dokon.firebaseapp.com",
  projectId:"kerasys-dokon"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let products=[];
let cart={};

/* RENDER */
function render(){
  const container=document.getElementById('products');
  container.innerHTML=products.map(p=>`
    <div class="card">
      <div class="img">${p.img ? `<img src="${p.img}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">` : '🧴'}</div>
      <div>${p.name}</div>
      <div class="price">${p.price.toLocaleString()} so'm</div>
      <button class="add" onclick="add('${p.id}')">Qo'shish</button>
    </div>
  `).join('');
}

/* CART */
window.add=(id)=>{
  cart[id]=(cart[id]||0)+1;
  updateCart();
};

function updateCart(){
  const total=Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('cartBtn').innerText="🛒 "+total;
}

/* FIREBASE REALTIME */
onSnapshot(collection(db,'products'),(snap)=>{
  products=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

</script>

</body>
</html>
