<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kerasys Do'kon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#FAF7F2; --warm:#F0EAE0; --gold:#B8935A; --gold-light:#D4AF7A;
  --dark:#1C1610; --text:#2D2416; --muted:#8A7A66; --card:#FFFFFF;
  --border:rgba(184,147,90,0.2); --success:#4A7C59; --danger:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
.header{background:var(--dark);padding:16px 20px 0;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold-light);}
.logo span{color:#fff;font-weight:400;}
.header-right{display:flex;gap:8px;align-items:center;}
.cart-btn,.admin-btn{background:rgba(184,147,90,0.15);border:1px solid rgba(184,147,90,0.3);border-radius:12px;padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--gold-light);font-size:13px;font-weight:500;}
.admin-btn{font-size:18px;padding:6px 10px;}
.cart-count{background:var(--gold);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:600;display:none;align-items:center;justify-content:center;}
.cart-count.visible{display:flex;}
.cats{display:flex;gap:8px;padding-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid rgba(184,147,90,0.3);background:transparent;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
.cat-btn.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:500;}
.main{padding:20px 16px 120px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;margin-bottom:4px;}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.product-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:transform 0.15s;position:relative;}
.product-card:active{transform:scale(0.97);}
.product-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:52px;background:var(--warm);position:relative;overflow:hidden;}
.product-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.product-img .emoji{position:relative;z-index:1;}
.badge{position:absolute;top:8px;right:8px;background:var(--gold);color:#fff;font-size:9px;font-weight:600;padding:3px 7px;border-radius:10px;z-index:2;}
.product-info{padding:10px 12px 12px;}
.product-name{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:2px;}
.product-desc{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.product-footer{display:flex;align-items:center;justify-content:space-between;}
.product-price{font-size:14px;font-weight:600;color:var(--gold);}
.add-btn{width:28px;height:28px;border-radius:8px;background:var(--dark);color:var(--gold-light);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-control{display:none;align-items:center;gap:6px;}
.qty-control.show{display:flex;}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--warm);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:13px;font-weight:600;min-width:16px;text-align:center;}
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--cream);border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:90vh;display:flex;flex-direction:column;}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.sheet-header{padding:12px 20px 0;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;}
.sheet-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
.sheet-body{flex:1;overflow-y:auto;padding:12px 20px;scrollbar-width:none;}
.sheet-body::-webkit-scrollbar{display:none;}
.cart-empty{text-align:center;padding:40px 0;color:var(--muted);}
.cart-empty .icon{font-size:48px;margin-bottom:12px;}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.cart-item-icon{width:48px;height:48px;border-radius:12px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;position:relative;}
.cart-item-icon img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-size:13px;font-weight:500;}
.cart-item-price{font-size:12px;color:var(--gold);font-weight:600;margin-top:2px;}
.cart-item-qty{display:flex;align-items:center;gap:8px;}
.cqty-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--border);background:var(--warm);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cqty-num{font-size:13px;font-weight:600;}
.sheet-footer{padding:12px 20px 20px;flex-shrink:0;border-top:1px solid var(--border);}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.total-label{font-size:14px;color:var(--muted);}
.total-price{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;}
.order-btn{width:100%;padding:15px;background:var(--dark);color:var(--gold-light);border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;}
.order-btn:disabled{opacity:0.4;cursor:not-allowed;}
.admin-tabs{display:flex;gap:8px;margin-bottom:16px;}
.atab{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:transparent;font-size:13px;cursor:pointer;color:var(--muted);}
.atab.active{background:var(--dark);color:var(--gold-light);border-color:var(--dark);}
.admin-product{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;}
.admin-product-icon{width:44px;height:44px;border-radius:10px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;position:relative;}
.admin-product-icon img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.admin-product-info{flex:1;min-width:0;}
.admin-product-name{font-size:13px;font-weight:500;}
.admin-product-price{font-size:12px;color:var(--gold);}
.admin-actions{display:flex;gap:6px;}
.edit-btn,.del-btn{padding:6px 10px;border-radius:8px;border:none;font-size:12px;cursor:pointer;font-weight:500;}
.edit-btn{background:var(--warm);color:var(--text);}
.del-btn{background:#fde8e8;color:var(--danger);}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;}
.form-input,.form-select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--gold);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.save-btn{width:100%;padding:13px;background:var(--gold);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;}
.cancel-btn{width:100%;padding:13px;background:var(--warm);color:var(--text);border:none;border-radius:12px;font-size:15px;cursor:pointer;margin-top:8px;}
.order-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:10px;}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.order-date{font-size:11px;color:var(--muted);}
.order-status{font-size:11px;padding:3px 8px;border-radius:8px;background:#e8f5e9;color:var(--success);font-weight:500;}
.order-items{font-size:13px;margin-bottom:6px;line-height:1.6;}
.order-total{font-size:14px;font-weight:600;color:var(--gold);}
.order-contact{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:var(--gold-light);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Kerasys<span> Do'kon</span></div>
    <div class="header-right">
      <button class="admin-btn" id="adminBtnHeader" style="display:none" onclick="openAdmin()">⚙️</button>
      <button class="cart-btn" onclick="openCart()">🛒 Savat <span class="cart-count" id="cartCount">0</span></button>
    </div>
  </div>
  <div class="cats" id="catTabs"></div>
</div>

<div class="main">
  <div class="section-title" id="sectionTitle">Barcha mahsulotlar</div>
  <div class="section-sub">Sifatli gigiyena mahsulotlari</div>
  <div id="productGrid"><div class="loading"><div class="spinner"></div>Yuklanmoqda...</div></div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- Cart -->
<div class="sheet" id="cartSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">🛒 Savat</div>
    <button class="sheet-close" onclick="closeAll()">✕</button>
  </div>
  <div class="sheet-body" id="cartBody"></div>
  <div class="sheet-footer">
    <div class="total-row">
      <span class="total-label">Jami:</span>
      <span class="total-price" id="totalPrice">0 so'm</span>
    </div>
    <button class="order-btn" id="orderBtn" onclick="openOrderForm()">Buyurtma berish</button>
  </div>
</div>

<!-- Order Form -->
<div class="sheet" id="orderSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">📋 Buyurtma</div>
    <button class="sheet-close" onclick="closeOrderSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="form-group"><label class="form-label">Ismingiz</label><input class="form-input" id="orderName" placeholder="Ism Familiya"></div>
    <div class="form-group"><label class="form-label">Telefon</label><input class="form-input" id="orderPhone" placeholder="+998901234567" type="tel"></div>
    <div class="form-group"><label class="form-label">Manzil</label><input class="form-input" id="orderAddress" placeholder="Shahar, ko'cha, uy"></div>
    <button class="save-btn" onclick="submitOrder()">✅ Buyurtmani yuborish</button>
    <button class="cancel-btn" onclick="closeOrderSheet()">Bekor qilish</button>
  </div>
</div>

<!-- Admin -->
<div class="sheet" id="adminSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">⚙️ Admin panel</div>
    <button class="sheet-close" onclick="closeAll()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="admin-tabs">
      <button class="atab active" onclick="switchAdminTab('products')">Mahsulotlar</button>
      <button class="atab" onclick="switchAdminTab('orders')">Buyurtmalar</button>
      <button class="atab" onclick="switchAdminTab('add')">+ Qo'shish</button>
    </div>
    <div id="adminProducts"></div>
    <div id="adminOrders" style="display:none"></div>
    <div id="adminAdd" style="display:none">
      <input type="hidden" id="editProductId">
      <div class="form-group"><label class="form-label">Mahsulot nomi</label><input class="form-input" id="pName" placeholder="Ariel 3kg"></div>
      <div class="form-group"><label class="form-label">Tavsif</label><input class="form-input" id="pDesc" placeholder="Avtomatik kir yuvish uchun"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Narx (so'm)</label><input class="form-input" id="pPrice" placeholder="45000" type="number"></div>
        <div class="form-group"><label class="form-label">Kategoriya</label>
          <select class="form-select" id="pCat">
            <option value="kukun">🧺 Kukunlar</option>
            <option value="gel">🧴 Gellar</option>
            <option value="shampun">🚿 Shampunlar</option>
            <option value="sovun">🧼 Sovunlar</option>
            <option value="boshqa">📦 Boshqa</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Rasm URL (ixtiyoriy)</label><input class="form-input" id="pImg" placeholder="https://...rasm.jpg"></div>
      <div class="form-group"><label class="form-label">Badge (masalan: Yangi, Arzon)</label><input class="form-input" id="pBadge" placeholder="Ommabop"></div>
      <button class="save-btn" onclick="saveProduct()">💾 Saqlash</button>
      <button class="cancel-btn" id="cancelEditBtn" style="display:none" onclick="cancelEdit()">Bekor qilish</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCaS_-p9gxwN2O64WoYLlRERisq2s7CEPs",
  authDomain: "kerasys-dokon.firebaseapp.com",
  projectId: "kerasys-dokon",
  storageBucket: "kerasys-dokon.firebasestorage.app",
  messagingSenderId: "890867885170",
  appId: "1:890867885170:web:2d989c60f4d4dbb5348eeb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_USERNAME = "notimetoyouu";
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const isAdmin = tg?.initDataUnsafe?.user?.username === ADMIN_USERNAME;
if (isAdmin) document.getElementById('adminBtnHeader').style.display = 'flex';

let allProducts = [];
let cart = {};
let currentCat = 'all';

const CATS = [
  {id:'all',label:'Barchasi'},
  {id:'kukun',label:'🧺 Kukunlar'},
  {id:'gel',label:'🧴 Gellar'},
  {id:'shampun',label:'🚿 Shampunlar'},
  {id:'sovun',label:'🧼 Sovunlar'},
  {id:'boshqa',label:'📦 Boshqa'},
];
const ICONS = {kukun:'🧺',gel:'🧴',shampun:'🚿',sovun:'🧼',boshqa:'📦'};

const fmt = n => Number(n).toLocaleString('uz-UZ') + ' so\'m';
const $ = id => document.getElementById(id);

function showToast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}
window.showToast = showToast;

function renderCats() {
  $('catTabs').innerHTML = CATS.map(c=>
    `<button class="cat-btn ${c.id===currentCat?'active':''}" onclick="selectCat('${c.id}')">${c.label}</button>`
  ).join('');
}

window.selectCat = id => {
  currentCat = id;
  $('sectionTitle').textContent = id==='all' ? 'Barcha mahsulotlar' : CATS.find(c=>c.id===id).label;
  renderCats();
  renderProducts();
};

function renderProducts() {
  const items = currentCat==='all' ? allProducts : allProducts.filter(p=>p.cat===currentCat);
  const el = $('productGrid');
  if (!items.length) { el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Mahsulot yo\'q</div>'; return; }
  el.innerHTML = `<div class="grid">${items.map(p=>{
    const qty = cart[p.id]?.qty||0;
    const icon = ICONS[p.cat]||'📦';
    return `<div class="product-card">
      <div class="product-img">
        ${p.img?`<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">`:''}
        <span class="emoji">${icon}</span>
        ${p.badge?`<div class="badge">${p.badge}</div>`:''}
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc||''}</div>
        <div class="product-footer">
          <div class="product-price">${fmt(p.price)}</div>
          ${qty===0
            ?`<button class="add-btn" onclick="addItem('${p.id}')">+</button>`
            :`<div class="qty-control show">
                <button class="qty-btn" onclick="removeItem('${p.id}')">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="addItem('${p.id}')">+</button>
              </div>`}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// Realtime products
onSnapshot(collection(db,'products'), snap => {
  allProducts = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderProducts();
});

// Cart
window.addItem = id => {
  const p = allProducts.find(x=>x.id===id);
  if (!p) return;
  if (!cart[id]) cart[id]={name:p.name,price:p.price,icon:ICONS[p.cat]||'📦',img:p.img||'',qty:0};
  cart[id].qty++;
  updateCartUI(); renderProducts();
  showToast(`${p.name} qo'shildi ✓`);
};
window.removeItem = id => {
  if (!cart[id]) return;
  cart[id].qty--;
  if (cart[id].qty<=0) delete cart[id];
  updateCartUI(); renderProducts();
};

function updateCartUI() {
  const count = Object.values(cart).reduce((s,i)=>s+i.qty,0);
  const total = Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);
  const el = $('cartCount');
  el.textContent = count;
  el.classList.toggle('visible',count>0);
  $('totalPrice').textContent = fmt(total);
  $('orderBtn').disabled = count===0;
}

window.openCart = () => {
  renderCartSheet();
  $('overlay').classList.add('open');
  $('cartSheet').classList.add('open');
};
window.closeAll = () => {
  $('overlay').classList.remove('open');
  ['cartSheet','adminSheet','orderSheet'].forEach(id=>$(id).classList.remove('open'));
};

function renderCartSheet() {
  const items = Object.entries(cart);
  const body = $('cartBody');
  if (!items.length) { body.innerHTML='<div class="cart-empty"><div class="icon">🛒</div>Savat bo\'sh</div>'; return; }
  body.innerHTML = items.map(([id,item])=>`
    <div class="cart-item">
      <div class="cart-item-icon">
        ${item.img?`<img src="${item.img}" onerror="this.style.display='none'">`:''}
        ${item.icon}
      </div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${fmt(item.price*item.qty)}</div>
      </div>
      <div class="cart-item-qty">
        <button class="cqty-btn" onclick="removeCartItem('${id}')">−</button>
        <span class="cqty-num">${item.qty}</span>
        <button class="cqty-btn" onclick="addCartItem('${id}')">+</button>
      </div>
    </div>`).join('');
}
window.addCartItem = id => { addItem(id); renderCartSheet(); };
window.removeCartItem = id => { removeItem(id); renderCartSheet(); };

window.openOrderForm = () => {
  $('cartSheet').classList.remove('open');
  $('orderSheet').classList.add('open');
};
window.closeOrderSheet = () => {
  $('orderSheet').classList.remove('open');
  $('cartSheet').classList.add('open');
  renderCartSheet();
};

window.submitOrder = async () => {
  const name = $('orderName').value.trim();
  const phone = $('orderPhone').value.trim();
  const address = $('orderAddress').value.trim();
  if (!name||!phone||!address) { showToast('Barcha maydonlarni to\'ldiring!'); return; }
  const items = Object.values(cart);
  const total = items.reduce((s,i)=>s+i.price*i.qty,0);
  const user = tg?.initDataUnsafe?.user;
  try {
    await addDoc(collection(db,'orders'),{
      name, phone, address,
      telegram: user?`@${user.username||user.first_name}`:'Noma\'lum',
      items: items.map(i=>({name:i.name,price:i.price,qty:i.qty})),
      total, status:'yangi', createdAt: new Date()
    });
    cart={};
    updateCartUI(); renderProducts(); closeAll();
    showToast('Buyurtmangiz qabul qilindi! ✓');
    ['orderName','orderPhone','orderAddress'].forEach(id=>$(id).value='');
  } catch(e){ showToast('Xatolik yuz berdi'); }
};

// Admin
window.openAdmin = () => {
  $('overlay').classList.add('open');
  $('adminSheet').classList.add('open');
  loadAdminProducts();
};

window.switchAdminTab = tab => {
  document.querySelectorAll('.atab').forEach((b,i)=>b.classList.toggle('active',['products','orders','add'][i]===tab));
  $('adminProducts').style.display = tab==='products'?'block':'none';
  $('adminOrders').style.display = tab==='orders'?'block':'none';
  $('adminAdd').style.display = tab==='add'?'block':'none';
  if (tab==='orders') loadAdminOrders();
};

function loadAdminProducts() {
  const el = $('adminProducts');
  if (!allProducts.length) { el.innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">Mahsulot yo\'q. + Qo\'shish bo\'limiga o\'ting</div>'; return; }
  el.innerHTML = allProducts.map(p=>`
    <div class="admin-product">
      <div class="admin-product-icon">
        ${p.img?`<img src="${p.img}" onerror="this.style.display='none'">`:''}
        ${ICONS[p.cat]||'📦'}
      </div>
      <div class="admin-product-info">
        <div class="admin-product-name">${p.name}</div>
        <div class="admin-product-price">${fmt(p.price)}</div>
      </div>
      <div class="admin-actions">
        <button class="edit-btn" onclick="editProduct('${p.id}')">✏️</button>
        <button class="del-btn" onclick="deleteProduct('${p.id}')">🗑</button>
      </div>
    </div>`).join('');
}

async function loadAdminOrders() {
  const el = $('adminOrders');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try {
    await new Promise(r=>{
      onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')), snap=>{
        if (snap.empty){ el.innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">Buyurtma yo\'q</div>'; r(); return; }
        el.innerHTML = snap.docs.map(d=>{
          const o=d.data();
          const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString('uz-UZ') : '';
          return `<div class="order-card">
            <div class="order-header"><span class="order-date">${date}</span><span class="order-status">✅ Yangi</span></div>
            <div class="order-items">${o.items.map(i=>`${i.name} x${i.qty}`).join(', ')}</div>
            <div class="order-total">${fmt(o.total)}</div>
            <div class="order-contact">👤 ${o.name}<br>📱 ${o.phone}<br>📍 ${o.address}<br>✈️ ${o.telegram}</div>
          </div>`;
        }).join('');
        r();
      });
    });
  } catch(e){ el.innerHTML='<div style="color:var(--muted)">Xatolik</div>'; }
}

window.editProduct = id => {
  const p = allProducts.find(x=>x.id===id);
  if (!p) return;
  $('editProductId').value=id;
  $('pName').value=p.name;
  $('pDesc').value=p.desc||'';
  $('pPrice').value=p.price;
  $('pCat').value=p.cat;
  $('pImg').value=p.img||'';
  $('pBadge').value=p.badge||'';
  $('cancelEditBtn').style.display='block';
  switchAdminTab('add');
};

window.cancelEdit = () => {
  $('editProductId').value='';
  ['pName','pDesc','pPrice','pImg','pBadge'].forEach(id=>$(id).value='');
  $('pCat').value='kukun';
  $('cancelEditBtn').style.display='none';
  switchAdminTab('products');
};

window.deleteProduct = async id => {
  if (!confirm('O\'chirishni tasdiqlaysizmi?')) return;
  await deleteDoc(doc(db,'products',id));
  showToast('Mahsulot o\'chirildi');
};

window.saveProduct = async () => {
  const name = $('pName').value.trim();
  const price = parseInt($('pPrice').value);
  if (!name||!price) { showToast('Nom va narx kiritish shart!'); return; }
  const data = {
    name, desc:$('pDesc').value.trim(), price,
    cat:$('pCat').value, img:$('pImg').value.trim(), badge:$('pBadge').value.trim()
  };
  const editId = $('editProductId').value;
  try {
    if (editId) { await updateDoc(doc(db,'products',editId),data); showToast('Yangilandi ✓'); }
    else { await addDoc(collection(db,'products'),data); showToast('Qo\'shildi ✓'); }
    cancelEdit();
  } catch(e){ showToast('Xatolik'); }
};

renderCats();
updateCartUI();
</script>
