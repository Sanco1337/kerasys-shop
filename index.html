<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Parfyumeriya Do'koni</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm: #F0EAE0;
    --gold: #B8935A;
    --gold-light: #D4AF7A;
    --dark: #1C1610;
    --text: #2D2416;
    --muted: #8A7A66;
    --card: #FFFFFF;
    --border: rgba(184,147,90,0.2);
    --success: #4A7C59;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--dark);
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.5px;
  }
  .logo span { color: #fff; font-weight: 400; }
  .cart-btn {
    position: relative;
    background: rgba(184,147,90,0.15);
    border: 1px solid rgba(184,147,90,0.3);
    border-radius: 12px;
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--gold-light);
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s;
  }
  .cart-btn:active { background: rgba(184,147,90,0.25); }
  .cart-count {
    background: var(--gold);
    color: #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    display: none;
  }
  .cart-count.visible { display: flex; }

  /* CATEGORIES */
  .cats {
    display: flex;
    gap: 8px;
    padding: 14px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--dark);
    padding-bottom: 14px;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(184,147,90,0.3);
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
  }
  .cat-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
    font-weight: 500;
  }

  /* MAIN */
  .main { padding: 20px 16px 120px; }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* PRODUCT GRID */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .product-card {
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .product-card:active { transform: scale(0.97); }
  .product-img {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    background: var(--warm);
    position: relative;
  }
  .product-img .badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--gold);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .product-info { padding: 10px 12px 12px; }
  .product-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .product-desc {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .product-price {
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
  }
  .add-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--dark);
    color: var(--gold-light);
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    line-height: 1;
  }
  .add-btn:active { background: var(--gold); color: #fff; }
  .qty-control {
    display: none;
    align-items: center;
    gap: 6px;
  }
  .qty-control.show { display: flex; }
  .qty-btn {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--warm);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }
  .qty-num { font-size: 13px; font-weight: 600; min-width: 16px; text-align: center; }

  /* CART SHEET */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .cart-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--cream);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
  }
  .cart-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: rgba(0,0,0,0.15);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .sheet-header {
    padding: 12px 20px 0;
    flex-shrink: 0;
  }
  .sheet-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }
  .sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    scrollbar-width: none;
  }
  .sheet-body::-webkit-scrollbar { display: none; }
  .cart-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 14px;
  }
  .cart-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .cart-item-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--warm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .cart-item-price { font-size: 12px; color: var(--gold); font-weight: 600; margin-top: 2px; }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cqty-btn {
    width: 26px; height: 26px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--warm);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
  }
  .cqty-num { font-size: 13px; font-weight: 600; }
  .sheet-footer {
    padding: 12px 20px 20px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .total-label { font-size: 14px; color: var(--muted); }
  .total-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
  }
  .order-btn {
    width: 100%;
    padding: 15px;
    background: var(--dark);
    color: var(--gold-light);
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s;
  }
  .order-btn:active { background: var(--gold); color: #fff; }
  .order-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: var(--gold-light);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Parfum<span>eria</span></div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Savat
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
  <div class="cats" id="catTabs"></div>
</div>

<div class="main">
  <div class="section-title" id="sectionTitle">Barcha mahsulotlar</div>
  <div class="section-sub" id="sectionSub">Sifatli gigiyena mahsulotlari</div>
  <div class="grid" id="productGrid"></div>
</div>

<!-- Cart Sheet -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sheet" id="cartSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">Savat</div>
  </div>
  <div class="sheet-body" id="cartBody"></div>
  <div class="sheet-footer">
    <div class="total-row">
      <span class="total-label">Jami to'lov:</span>
      <span class="total-price" id="totalPrice">0 so'm</span>
    </div>
    <button class="order-btn" id="orderBtn" onclick="sendOrder()">Buyurtma berish</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const PRODUCTS = [
  { id:1, cat:'kukun', name:'Ariel 3kg', desc:'Avtomat uchun', price:45000, icon:'🧺', badge:'Ommabop' },
  { id:2, cat:'kukun', name:'Tide 2kg', desc:'Qo\'lda yuvish', price:35000, icon:'🧺', badge:'' },
  { id:3, cat:'kukun', name:'OMO 1kg', desc:'Universal', price:18000, icon:'🧺', badge:'Arzon' },
  { id:4, cat:'gel', name:'Fairy 1L', desc:'Idish yuvish', price:22000, icon:'🧴', badge:'' },
  { id:5, cat:'gel', name:'Domestos 750ml', desc:'Tozalash geli', price:28000, icon:'🧴', badge:'' },
  { id:6, cat:'gel', name:'Persil Gel 1.5L', desc:'Kir yuvish', price:38000, icon:'🧴', badge:'Yangi' },
  { id:7, cat:'shampun', name:'Head & Shoulders 400ml', desc:'Kepak qarshi', price:32000, icon:'🚿', badge:'' },
  { id:8, cat:'shampun', name:'Pantene 400ml', desc:'Soch mustahkamlash', price:28000, icon:'🚿', badge:'' },
  { id:9, cat:'shampun', name:'Dove 400ml', desc:'Namlantiruvchi', price:25000, icon:'🚿', badge:'' },
  { id:10, cat:'sovun', name:'Safeguard 90g', desc:'Bakteriyaga qarshi', price:8000, icon:'🧼', badge:'' },
  { id:11, cat:'sovun', name:'Dove 100g', desc:'Namlantiruvchi', price:12000, icon:'🧼', badge:'Ommabop' },
  { id:12, cat:'sovun', name:'Dettol 100g', desc:'Dezinfeksiyalovchi', price:10000, icon:'🧼', badge:'' },
];

const CATS = [
  { id:'all', label:'Barchasi' },
  { id:'kukun', label:'🧺 Kukunlar' },
  { id:'gel', label:'🧴 Gellar' },
  { id:'shampun', label:'🚿 Shampunlar' },
  { id:'sovun', label:'🧼 Sovunlar' },
];

let cart = {};
let currentCat = 'all';

function fmt(n) { return n.toLocaleString('uz-UZ') + ' so\'m'; }

// Render categories
function renderCats() {
  const el = document.getElementById('catTabs');
  el.innerHTML = CATS.map(c => `
    <button class="cat-btn ${c.id===currentCat?'active':''}" onclick="selectCat('${c.id}')">${c.label}</button>
  `).join('');
}

function selectCat(id) {
  currentCat = id;
  const cat = CATS.find(c=>c.id===id);
  document.getElementById('sectionTitle').textContent = cat.id==='all' ? 'Barcha mahsulotlar' : cat.label;
  renderCats();
  renderProducts();
}

// Render products
function renderProducts() {
  const items = currentCat==='all' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===currentCat);
  const el = document.getElementById('productGrid');
  el.innerHTML = items.map(p => {
    const qty = cart[p.id]?.qty || 0;
    return `
    <div class="product-card">
      <div class="product-img">
        ${p.icon}
        ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
      </div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">
          <div class="product-price">${fmt(p.price)}</div>
          ${qty===0
            ? `<button class="add-btn" onclick="addItem(${p.id})">+</button>`
            : `<div class="qty-control show">
                <button class="qty-btn" onclick="removeItem(${p.id})">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="addItem(${p.id})">+</button>
               </div>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

function addItem(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  if (!cart[id]) cart[id] = { name:p.name, price:p.price, icon:p.icon, qty:0 };
  cart[id].qty++;
  updateCart();
  renderProducts();
  showToast(`${p.name} savatga qo'shildi ✓`);
}

function removeItem(id) {
  if (!cart[id]) return;
  cart[id].qty--;
  if (cart[id].qty <= 0) delete cart[id];
  updateCart();
  renderProducts();
}

function updateCart() {
  const total = Object.values(cart).reduce((s,i)=>s+i.price*i.qty, 0);
  const count = Object.values(cart).reduce((s,i)=>s+i.qty, 0);
  const countEl = document.getElementById('cartCount');
  countEl.textContent = count;
  countEl.classList.toggle('visible', count>0);
  document.getElementById('totalPrice').textContent = fmt(total);
  document.getElementById('orderBtn').disabled = count===0;
}

function openCart() {
  renderCartSheet();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('cartSheet').classList.add('open');
}

function closeCart() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('cartSheet').classList.remove('open');
}

function renderCartSheet() {
  const items = Object.entries(cart);
  const body = document.getElementById('cartBody');
  if (items.length===0) {
    body.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div>Savat bo'sh</div>`;
    return;
  }
  body.innerHTML = items.map(([id, item]) => `
    <div class="cart-item">
      <div class="cart-item-icon">${item.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${fmt(item.price * item.qty)}</div>
      </div>
      <div class="cart-item-qty">
        <button class="cqty-btn" onclick="removeCartItem(${id})">−</button>
        <span class="cqty-num">${item.qty}</span>
        <button class="cqty-btn" onclick="addCartItem(${id})">+</button>
      </div>
    </div>
  `).join('');
}

function addCartItem(id) { addItem(parseInt(id)); renderCartSheet(); }
function removeCartItem(id) { removeItem(parseInt(id)); renderCartSheet(); }

function sendOrder() {
  if (Object.keys(cart).length===0) return;
  const items = Object.values(cart).map(i=>`${i.name} x${i.qty} = ${fmt(i.price*i.qty)}`).join('\n');
  const total = Object.values(cart).reduce((s,i)=>s+i.price*i.qty,0);
  const text = `🛍 Yangi buyurtma!\n\n${items}\n\n💰 Jami: ${fmt(total)}`;

  if (tg) {
    tg.sendData(text);
  } else {
    alert('Buyurtma yuborildi!\n\n' + text);
  }
  cart = {};
  updateCart();
  renderProducts();
  closeCart();
  showToast('Buyurtmangiz qabul qilindi! ✓');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// Init
renderCats();
renderProducts();
updateCart();
</script>
</body>
</html>
