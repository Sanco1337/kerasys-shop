<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kerasys Do'kon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F9FF;
  --bg2: #FFFFFF;
  --bg3: #EEF0FF;
  --card: #FFFFFF;
  --card2: #F0F2FF;
  --accent: #5B52E0;
  --accent2: #E84A6A;
  --accent3: #2DC46A;
  --accent4: #F0941E;
  --text: #1A1A2E;
  --text2: #6B6B8A;
  --border: rgba(91,82,224,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(91,82,224,0.08);
  --shadow-lg: 0 8px 32px rgba(91,82,224,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

.header {
  background: linear-gradient(135deg, #FFFFFF 0%, #F0F2FF 100%);
  padding: 14px 16px 0;
  position: sticky; top:0; z-index:100;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:36px; height:36px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo-text { font-size:18px; font-weight:900; color:var(--text); letter-spacing:-0.5px; }
.logo-text span { color:var(--accent); }
.header-right { display:flex; gap:8px; }
.hbtn {
  display:flex; align-items:center; gap:6px;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:8px 14px;
  color:var(--text); font-family:'Nunito',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.hbtn:active { transform:scale(0.95); background:var(--accent); color:#fff; }
.hbtn.call { background:var(--accent3); color:#fff; border-color:var(--accent3); }
.hbtn.call:active { background:#25a85a; }

.search-wrap { position:relative; margin-bottom:12px; }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text2); font-size:16px; pointer-events:none; }
.search-input {
  width:100%; padding:12px 40px 12px 42px; border-radius:12px;
  border:1.5px solid var(--border); background:var(--card);
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:600;
  color:var(--text); outline:none; transition:border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color:var(--accent); box-shadow: 0 0 0 3px rgba(91,82,224,0.1); }
.search-input::placeholder { color:var(--text2); }
.search-clear {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:var(--card2); border:none; width:22px; height:22px; border-radius:50%;
  color:var(--text2); font-size:12px; cursor:pointer; display:none; align-items:center; justify-content:center;
}
.search-clear.on { display:flex; }

.sort-wrap { display:flex; gap:8px; margin-bottom:12px; overflow-x:auto; scrollbar-width:none; }
.sort-wrap::-webkit-scrollbar { display:none; }
.sort-btn {
  white-space:nowrap; padding:6px 12px; border-radius:8px;
  border:1.5px solid var(--border); background:transparent;
  color:var(--text2); font-size:11px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.sort-btn.on { background:var(--accent); border-color:var(--accent); color:#fff; }

.cats { display:flex; gap:8px; padding-bottom:12px; overflow-x:auto; scrollbar-width:none; }
.cats::-webkit-scrollbar { display:none; }
.cat-pill {
  white-space:nowrap; padding:7px 16px;
  border-radius:20px; border:1.5px solid var(--border);
  background:transparent; color:var(--text2);
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.cat-pill.on { background:var(--accent); border-color:var(--accent); color:#fff; }

.main { padding:16px 12px 100px; }
.page-title { font-size:22px; font-weight:900; margin-bottom:4px; }
.page-sub { font-size:12px; color:var(--text2); margin-bottom:16px; }

/* CATEGORY GRID */
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.cat-card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid var(--border); padding:20px 16px;
  text-align:center; cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
  box-shadow: var(--shadow);
}
.cat-card:active { transform:scale(0.96); }
.cat-icon { font-size:40px; margin-bottom:8px; }
.cat-name { font-size:14px; font-weight:800; color:var(--text); }
.cat-count { font-size:11px; color:var(--text2); margin-top:4px; }
.cat-back { display:flex; align-items:center; gap:6px; color:var(--accent); font-size:13px; font-weight:700; margin-bottom:12px; cursor:pointer; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.p-card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid var(--border); overflow:hidden;
  transition:transform 0.15s, box-shadow 0.15s;
  position:relative;
  box-shadow: var(--shadow);
}
.p-card:active { transform:scale(0.96); }

.p-img {
  width:100%; aspect-ratio:1;
  background:var(--card2);
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.p-img img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.p-img .fallback { font-size:52px; line-height:1; }
.p-img img.loaded ~ .fallback { display:none; }
.p-img img.errored { display:none; }

.p-badge {
  position:absolute; top:8px; left:8px;
  background:var(--accent2); color:#fff;
  font-size:9px; font-weight:800; padding:3px 8px;
  border-radius:20px; z-index:3; text-transform:uppercase;
}
.p-body { padding:10px 12px 12px; }
.p-name { font-size:13px; font-weight:800; line-height:1.3; margin-bottom:2px; }
.p-desc { font-size:11px; color:var(--text2); margin-bottom:10px; line-height:1.4; }
.p-foot { display:flex; align-items:center; justify-content:space-between; }
.p-price { font-size:14px; font-weight:900; color:var(--accent); }
.add-btn {
  width:30px; height:30px; border-radius:9px;
  background:var(--accent); color:#fff; border:none;
  font-size:20px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.1s;
}
.add-btn:active { transform:scale(0.88); }
.qty-wrap { display:none; align-items:center; gap:6px; }
.qty-wrap.on { display:flex; }
.q-btn {
  width:26px; height:26px; border-radius:8px;
  border:1.5px solid var(--border); background:var(--card2);
  color:var(--text); font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.q-num { font-size:14px; font-weight:800; min-width:18px; text-align:center; }
.inactive-badge {
  position:absolute; inset:0; background:rgba(255,255,255,0.85);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800; color:var(--text); z-index:5;
  border-radius:var(--radius);
}

/* VARIANT MODAL */
.var-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.var-overlay.on { opacity:1; pointer-events:all; }
.var-modal {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg2); border-radius:24px 24px 0 0;
  z-index:301; transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height:85vh; display:flex; flex-direction:column;
  border:1px solid var(--border);
}
.var-modal.on { transform:translateY(0); }
.var-handle { width:40px; height:4px; background:rgba(0,0,0,0.12); border-radius:2px; margin:12px auto; flex-shrink:0; }
.var-head { padding:0 20px; flex-shrink:0; }
.var-title { font-size:18px; font-weight:900; margin-bottom:4px; }
.var-sub { font-size:12px; color:var(--text2); margin-bottom:12px; }
.var-body { flex:1; overflow-y:auto; padding:0 20px 20px; scrollbar-width:none; }
.var-option {
  display:flex; align-items:center; gap:12px;
  padding:12px; background:var(--card2); border-radius:12px;
  margin-bottom:8px; cursor:pointer;
  border:2px solid transparent;
  transition:all 0.2s;
}
.var-option.on { border-color:var(--accent); background:rgba(91,82,224,0.08); }
.var-option:active { transform:scale(0.98); }
.var-radio { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; }
.var-radio.on { border-color:var(--accent); background:var(--accent); }
.var-radio.on::after { content:'✓'; color:#fff; font-size:12px; font-weight:800; }
.var-opt-name { flex:1; font-size:14px; font-weight:700; }
.var-opt-price { font-size:13px; font-weight:800; color:var(--accent); }
.var-foot { padding:12px 20px 20px; flex-shrink:0; border-top:1px solid var(--border); }
.var-add-btn {
  width:100%; padding:14px; border:none; border-radius:12px;
  background:var(--accent); color:#fff; font-size:15px; font-weight:800;
  cursor:pointer; font-family:'Nunito',sans-serif;
}
.var-add-btn:active { transform:scale(0.98); }

/* PRODUCT DETAIL MODAL */
.pd-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.pd-overlay.on { opacity:1; pointer-events:all; }
.pd-modal {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.9);
  background:var(--bg2); border-radius:var(--radius); width:90%; max-width:360px;
  z-index:301; opacity:0; pointer-events:none; transition:all 0.3s;
  border:1px solid var(--border); box-shadow: var(--shadow-lg);
}
.pd-modal.on { opacity:1; pointer-events:all; transform:translate(-50%,-50%) scale(1); }
.pd-img { width:100%; aspect-ratio:1; background:var(--card2); position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; border-radius:var(--radius) var(--radius) 0 0; }
.pd-img img { width:100%; height:100%; object-fit:cover; }
.pd-close { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); border:none; width:30px; height:30px; border-radius:50%; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.pd-body { padding:16px; }
.pd-name { font-size:18px; font-weight:900; margin-bottom:6px; }
.pd-desc { font-size:13px; color:var(--text2); margin-bottom:12px; line-height:1.5; }
.pd-price-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.pd-price { font-size:22px; font-weight:900; color:var(--accent); }
.pd-old { font-size:14px; color:var(--text2); text-decoration:line-through; }
.pd-actions { display:flex; gap:10px; }
.pd-qty { flex:1; display:flex; align-items:center; justify-content:center; gap:10px; background:var(--card2); border-radius:12px; padding:8px; }
.pd-qbtn { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:var(--card); color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.pd-qnum { font-size:18px; font-weight:800; min-width:24px; text-align:center; }
.pd-add { flex:2; padding:12px; border:none; border-radius:12px; background:var(--accent); color:#fff; font-size:15px; font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif; }
.pd-add:active { transform:scale(0.97); }

/* CODE CHECK MODAL */
.code-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.code-overlay.on { opacity:1; pointer-events:all; }
.code-modal {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.9);
  background:var(--bg2); border-radius:var(--radius); width:90%; max-width:360px;
  z-index:301; opacity:0; pointer-events:none; transition:all 0.3s;
  border:1px solid var(--border); box-shadow: var(--shadow-lg);
  padding:24px;
}
.code-modal.on { opacity:1; pointer-events:all; transform:translate(-50%,-50%) scale(1); }
.code-title { font-size:20px; font-weight:900; text-align:center; margin-bottom:8px; }
.code-sub { font-size:13px; color:var(--text2); text-align:center; margin-bottom:20px; }
.code-input {
  width:100%; padding:14px; border-radius:12px;
  border:2px solid var(--border); background:var(--card);
  font-family:'Nunito',sans-serif; font-size:20px; font-weight:800;
  color:var(--text); outline:none; text-align:center; letter-spacing:4px;
  transition:border-color 0.2s;
}
.code-input:focus { border-color:var(--accent); }
.code-check {
  width:100%; padding:14px; margin-top:12px; border:none; border-radius:12px;
  background:var(--accent); color:#fff; font-size:15px; font-weight:800;
  cursor:pointer; font-family:'Nunito',sans-serif;
}
.code-check:active { transform:scale(0.98); }
.code-result { margin-top:16px; display:none; }
.code-result.on { display:block; }
.code-result-card { background:var(--card2); border-radius:12px; padding:16px; }
.code-result-status { font-size:14px; font-weight:800; padding:6px 12px; border-radius:20px; display:inline-block; margin-bottom:8px; }
.code-result-items { font-size:13px; line-height:1.7; margin-bottom:8px; }
.code-result-total { font-size:18px; font-weight:900; color:var(--accent); }
.code-close { background:var(--card2); border:none; width:100%; padding:12px; border-radius:10px; margin-top:12px; font-size:14px; font-weight:700; cursor:pointer; color:var(--text2); font-family:'Nunito',sans-serif; }

.loading { text-align:center; padding:60px 20px; color:var(--text2); grid-column:1/-1; }
.spin { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.overlay.on { opacity:1; pointer-events:all; }
.sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg2); border-radius:24px 24px 0 0;
  z-index:201; transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height:92vh; display:flex; flex-direction:column;
  border-top:1px solid var(--border);
  box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
}
.sheet.on { transform:translateY(0); }
.s-handle { width:40px; height:4px; background:rgba(0,0,0,0.12); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
.s-head { padding:14px 20px 0; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.s-title { font-size:20px; font-weight:900; }
.s-close { background:var(--card2); border:none; width:30px; height:30px; border-radius:8px; color:var(--text2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.s-body { flex:1; overflow-y:auto; padding:14px 20px; scrollbar-width:none; }
.s-body::-webkit-scrollbar { display:none; }
.s-foot { padding:12px 20px 20px; flex-shrink:0; border-top:1px solid var(--border); background:var(--bg2); }

.empty { text-align:center; padding:50px 0; color:var(--text2); }
.empty-icon { font-size:56px; margin-bottom:12px; }
.empty-txt { font-size:15px; font-weight:700; }
.c-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.c-thumb {
  width:52px; height:52px; border-radius:12px;
  background:var(--card2); flex-shrink:0;
  overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center; font-size:26px;
}
.c-thumb img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.c-thumb img.errored { display:none; }
.c-info { flex:1; min-width:0; }
.c-name { font-size:13px; font-weight:800; }
.c-var { font-size:11px; color:var(--accent); font-weight:600; margin-top:2px; }
.c-price { font-size:12px; color:var(--accent); font-weight:700; margin-top:2px; }
.c-qty { display:flex; align-items:center; gap:8px; }
.cq-btn { width:28px; height:28px; border-radius:8px; border:1.5px solid var(--border); background:var(--card2); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cq-n { font-size:14px; font-weight:800; }
.total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.total-lbl { font-size:14px; color:var(--text2); font-weight:700; }
.total-val { font-size:26px; font-weight:900; color:var(--accent); }
.big-btn {
  width:100%; padding:15px; border:none; border-radius:14px;
  font-family:'Nunito',sans-serif; font-size:16px; font-weight:800;
  cursor:pointer; transition:transform 0.1s, opacity 0.2s;
}
.big-btn:active { transform:scale(0.97); }
.big-btn.primary { background:linear-gradient(135deg,var(--accent),#7B72E8); color:#fff; box-shadow: 0 4px 16px rgba(91,82,224,0.3); }
.big-btn.secondary { background:var(--card2); color:var(--text2); margin-top:8px; }
.big-btn:disabled { opacity:0.35; cursor:not-allowed; }
.big-btn.danger { background:linear-gradient(135deg,var(--accent2),#FF6B8A); color:#fff; }

.f-group { margin-bottom:14px; }
.f-label { font-size:12px; color:var(--text2); font-weight:700; margin-bottom:6px; display:block; text-transform:uppercase; letter-spacing:0.5px; }
.f-input, .f-select {
  width:100%; padding:12px 14px; border-radius:12px;
  border:1.5px solid var(--border); background:var(--card);
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:600;
  color:var(--text); outline:none; transition:border-color 0.2s;
}
.f-input:focus, .f-select:focus { border-color:var(--accent); }
.f-input::placeholder { color:var(--text2); }
.f-select option { background:var(--card); }
.f-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.time-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.time-opt {
  padding:12px; border-radius:10px; border:1.5px solid var(--border);
  background:var(--card2); text-align:center; cursor:pointer;
  transition:all 0.2s;
}
.time-opt.on { border-color:var(--accent); background:rgba(91,82,224,0.08); }
.time-opt-time { font-size:15px; font-weight:800; color:var(--text); }
.time-opt-label { font-size:11px; color:var(--text2); margin-top:2px; }

/* FLOATING CART */
.float-cart {
  position:fixed; bottom:20px; right:20px;
  width:60px; height:60px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#7B72E8);
  border:none; box-shadow: 0 4px 20px rgba(91,82,224,0.4);
  cursor:pointer; z-index:150;
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.2s;
}
.float-cart:active { transform:scale(0.9); }
.float-cart::after {
  content:'🛒'; font-size:24px;
}
.float-badge {
  position:absolute; top:-4px; right:-4px;
  background:var(--accent2); color:#fff;
  border-radius:50%; min-width:22px; height:22px;
  font-size:11px; font-weight:800;
  display:none; align-items:center; justify-content:center;
  border:2px solid var(--bg);
}
.float-badge.on { display:flex; }

/* ADMIN */
.adm-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.a-tab {
  flex:1; min-width:0; padding:9px 6px; border-radius:10px;
  border:1.5px solid var(--border); background:transparent;
  font-size:12px; font-weight:800; cursor:pointer; color:var(--text2);
  transition:all 0.2s; white-space:nowrap;
}
.a-tab.on { background:var(--accent); border-color:var(--accent); color:#fff; }

.adm-search { position:relative; margin-bottom:12px; }
.adm-search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text2); }
.adm-search-input {
  width:100%; padding:10px 12px 10px 38px; border-radius:10px;
  border:1.5px solid var(--border); background:var(--card);
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:600;
  color:var(--text); outline:none;
}
.adm-search-input::placeholder { color:var(--text2); }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.stat-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:14px; box-shadow: var(--shadow); }
.stat-icon { font-size:24px; margin-bottom:6px; }

.chart-label { font-size:11px; color:var(--text2); font-weight:700; margin-bottom:4px; display:flex; justify-content:space-between; }
.chart-track { height:8px; background:var(--card2); border-radius:4px; overflow:hidden; }
.chart-fill { height:100%; background:linear-gradient(90deg,var(--accent),#7B72E8); border-radius:4px; transition:width 0.5s; }

.code-gen-btn { padding:12px 16px; border-radius:10px; border:none; background:var(--accent3); color:#fff; font-size:13px; font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif; white-space:nowrap; }

/* ADMIN PRODUCT LIST */

  display:flex; align-items:center; gap:10px;

}
.adm-p-thumb {
  width:46px; height:46px; border-radius:10px;

}
.adm-p-thumb img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.adm-p-thumb img.errored { display:none; }
.adm-p-info { flex:1; min-width:0; }
.adm-p-name { font-size:13px; font-weight:800; }

.ia-btn {
  width:30px; height:30px; border-radius:8px; border:none;

  transition:transform 0.1s;
}
.ia-btn:active { transform:scale(0.9); }
.ia-edit { background:rgba(91,82,224,0.1); color:var(--accent); }
.ia-toggle { background:rgba(45,196,106,0.1); color:var(--accent3); }
.ia-toggle.off { background:rgba(232,74,106,0.1); color:var(--accent2); }
.ia-del { background:rgba(232,74,106,0.1); color:var(--accent2); }

.bulk-bar { display:none; align-items:center; gap:10px; padding:10px 14px; background:var(--accent); border-radius:12px; margin-bottom:12px; color:#fff; }
.bulk-bar.on { display:flex; }
.bulk-count { font-size:13px; font-weight:800; flex:1; }
.bulk-btn { padding:6px 12px; border-radius:8px; border:1.5px solid rgba(255,255,255,0.3); background:transparent; color:#fff; font-size:11px; font-weight:700; cursor:pointer; }

.ord-filters { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; scrollbar-width:none; flex-wrap:wrap; }
.ord-filters::-webkit-scrollbar { display:none; }
.ord-filter { padding:6px 12px; border-radius:20px; border:1.5px solid var(--border); background:transparent; color:var(--text2); font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; }
.ord-filter.on { background:var(--accent); border-color:var(--accent); color:#fff; }
.ord-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:14px; margin-bottom:10px; box-shadow: var(--shadow); }
.ord-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
.ord-num { font-size:12px; color:var(--text2); font-weight:700; }
.ord-code { background:var(--accent3); color:#fff; padding:3px 8px; border-radius:6px; font-weight:800; font-size:12px; }
.ord-status {
  font-size:11px; font-weight:800; padding:4px 10px;

}
.ord-status.yangi { background:rgba(91,82,224,0.12); color:var(--accent); }
.ord-status.jarayonda { background:rgba(240,148,30,0.12); color:var(--accent4); }

.ord-actions { display:flex; gap:6px; margin-top:10px; }
.ord-action-btn { flex:1; padding:8px; border-radius:8px; border:1.5px solid var(--border); background:var(--card2); font-size:11px; font-weight:700; cursor:pointer; color:var(--text2); font-family:'Nunito',sans-serif; }
.ord-action-btn.del { background:rgba(232,74,106,0.1); color:var(--accent2); border-color:rgba(232,74,106,0.2); }

/* TOAST */

}
.toast.on { transform:translateX(-50%) translateY(0); }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, onSnapshot, orderBy, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyCaS_-p9gxwN2O64WoYLlRERisq2s7CEPs",
  authDomain:"kerasys-dokon.firebaseapp.com",
  projectId:"kerasys-dokon",
  storageBucket:"kerasys-dokon.firebasestorage.app",
  messagingSenderId:"890867885170",
  appId:"1:890867885170:web:2d989c60f4d4dbb5348eeb"
};
const fbApp = initializeApp(FB);
const db = getFirestore(fbApp);

const ADMIN = "notimetoyouu";
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const tgUser = tg?.initDataUnsafe?.user;
const isAdmin = tgUser?.username===ADMIN;
if(isAdmin) document.getElementById('adminBtn').style.display='flex';

const CATS=[
  {id:'kukun',label:'🧺 Kukunlar'},
  {id:'gel',label:'🧴 Gellar'},
  {id:'shampun',label:'🚿 Shampunlar'},
  {id:'sovun',label:'🧼 Sovunlar'},
  {id:'boshqa',label:'📦 Boshqa'},
];
const ICONS={kukun:'🧺',gel:'🧴',shampun:'🚿',sovun:'🧼',boshqa:'📦'};
const STATUSES=['yangi','jarayonda','tayyor','yetkazildi','bekor'];
const STATUS_LABELS={yangi:'🟣 Yangi',jarayonda:'🟡 Jarayonda',tayyor:'🟢 Tayyor',yetkazildi:'✅ Oldi',bekor:'🔴 Bekor'};

let products=[], cart={}, currentCat=null, currentSort='default', searchQuery='';
let allOrders=[], currentOrderFilter='all', orderSearchQuery='';
let selectedProducts=new Set(), currentPdProduct=null, pdQty=1;
let currentVariantProduct=null, selectedVariant=null;
let codeCheckOrder=null;

const fmt=n=>Number(n).toLocaleString('uz-UZ')+' so\'m';
const $=id=>document.getElementById(id);
const g=id=>$(id)?.value.trim();

function toast(msg){
  const el=$('toast');
  el.textContent=msg;
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2500);
}
window.toast=toast;

/* ── INIT VIEW ── */
function initView(){
  $('pgTitle').textContent='Kerasys Do\'kon';
  $('pgSub').textContent='Sifatli gigiyena mahsulotlari';
  $('catGrid').style.display='grid';
  $('pgGrid').style.display='none';
  $('searchWrap').style.display='none';
  $('sortWrap').style.display='none';
  $('catTabs').style.display='none';
  renderCatGrid();
}

function renderCatGrid(){
  $('catGrid').innerHTML=CATS.map(c=>{
    const count=products.filter(p=>p.cat===c.id&&p.active!==false).length;
    return `<div class="cat-card" onclick="setCat('${c.id}')">
      <div class="cat-icon">${ICONS[c.id]||'📦'}</div>
      <div class="cat-name">${c.label.replace(/^\S+\s/,'')}</div>
      <div class="cat-count">${count} ta mahsulot</div>
    </div>`;
  }).join('');
}

window.setCat=id=>{
  currentCat=id;
  const cat=CATS.find(c=>c.id===id);
  $('pgTitle').innerHTML=`<span onclick="backToCats()" style="cursor:pointer;color:var(--accent)">← </span>${cat?cat.label.replace(/^\S+\s/,''):'Mahsulotlar'}`;
  $('pgSub').textContent='Sifatli gigiyena mahsulotlari';
  $('catGrid').style.display='none';
  $('pgGrid').style.display='block';
  $('searchWrap').style.display='block';
  $('catTabs').style.display='flex';
  renderCats(); renderProducts();
};

window.backToCats=()=>{
  currentCat=null;
  initView();
};

/* ── SEARCH ── */
window.handleSearch=val=>{
  searchQuery=val.toLowerCase();
  $('searchClear').classList.toggle('on',val.length>0);
  $('sortWrap').style.display=val.length>0?'flex':'none';
  renderProducts();
};

window.clearSearch=()=>{
  $('searchInput').value='';
  handleSearch('');
};

/* ── SORT ── */
window.setSort=(type,btn)=>{
  currentSort=type;
  if(btn){
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  }
  renderProducts();
};

/* ── CATEGORIES TABS ── */
function renderCats(){
  $('catTabs').innerHTML=[{id:'all',label:'✨ Barchasi'},...CATS].map(c=>
    `<button class="cat-pill ${c.id===currentCat?'on':''}" onclick="setCatTab('${c.id}')">${c.label}</button>`
  ).join('');
}

window.setCatTab=id=>{
  currentCat=id;
  const cat=CATS.find(c=>c.id===id);
  $('pgTitle').innerHTML=`<span onclick="backToCats()" style="cursor:pointer;color:var(--accent)">← </span>${id==='all'?'Barchasi':(cat?cat.label.replace(/^\S+\s/,''):'')}`;
  renderCats(); renderProducts();
};

/* ── PRODUCTS ── */
function getFilteredProducts(){
  let list=currentCat==='all'||!currentCat?products:products.filter(p=>p.cat===currentCat);
  if(searchQuery){
    list=list.filter(p=>p.name.toLowerCase().includes(searchQuery)||(p.desc||'').toLowerCase().includes(searchQuery));
  }
  if(currentSort==='price_asc') list.sort((a,b)=>a.price-b.price);
  else if(currentSort==='price_desc') list.sort((a,b)=>b.price-a.price);
  return list;
}

function renderProducts(){
  const list=getFilteredProducts();
  const el=$('pgGrid');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text2);font-weight:700">Mahsulot topilmadi</div>';return;}
  el.innerHTML=`<div class="grid">${list.map(p=>{
    const qty=cart[p.id]?.qty||0;
    const icon=ICONS[p.cat]||'📦';
    const active=p.active!==false;
    const hasVariants=p.variants&&p.variants.length>0;

window.addItem=id,variant=null=>{
  const p=products.find(x=>x.id===id);
  if(!p||p.active===false)return;
  const key=variant?`${id}_${variant}`:id;
  if(!cart[key])cart[key]={id,key,name:p.name,price:p.price,icon:ICONS[p.cat]||'📦',img:p.img||'',qty:0,variant};
  cart[key].qty++;
  updateCartUI(); renderProducts();
  if(!currentPdProduct && !currentVariantProduct) toast(`✓ ${p.name}${variant?' ('+variant+')':''} qo'shildi`);
};
window.rmItem=key=>{
  if(!cart[key])return;
  cart[key].qty--;
  if(cart[key].qty<=0)delete cart[key];
  updateCartUI(); renderProducts();
};

  const cnt=Object.values(cart).reduce((s,i)=>s+i.qty,0);

/* ── TIME PICKER ── */
function generateTimeSlots(){
  const now=new Date();
  const slots=[];
  for(let h=9;h<=20;h+=1){
    const timeStr=`${h.toString().padStart(2,'0')}:00`;
    const isPast=now.getHours()>=h;
    slots.push({time:timeStr,isPast});
  }
  return slots;
}

function renderTimeOptions(){
  const slots=generateTimeSlots();
  $('timeOptions').innerHTML=slots.map((s,i)=>`
    <div class="time-opt ${i===0?'on':''}" onclick="selectTime(this,'${s.time}')">
      <div class="time-opt-time">${s.time}</div>
      <div class="time-opt-label">${s.isPast?'(o\'tdi)':''}</div>
    </div>
  `).join('');
  window.selectedTime=slots[0].time;
}

window.selectTime=(el,time)=>{
  document.querySelectorAll('.time-opt').forEach(e=>e.classList.remove('on'));
  el.classList.add('on');
  window.selectedTime=time;
};

async function loadStats(){
  const el=$('aStats');
  try{
    const pSnap=await getDocs(collection(db,'products'));
    const oSnap=await getDocs(collection(db,'orders'));
    const orders=oSnap.docs.map(d=>d.data());
    const total=orders.reduce((s,o)=>s+(o.total||0),0);
    const today=new Date().toDateString();
    const todayOrds=orders.filter(o=>o.createdAt?.toDate?.().toDateString()===today);
    const todayTotal=todayOrds.reduce((s,o)=>s+(o.total||0),0);
    const active=pSnap.docs.filter(d=>d.data().active!==false).length;
    const newOrders=orders.filter(o=>o.status==='yangi').length;
    const readyOrders=orders.filter(o=>o.status==='tayyor').length;
    const completedOrders=orders.filter(o=>o.status==='yetkazildi').length;
    el.innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-val">${pSnap.size}</div><div class="stat-lbl">Mahsulotlar</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">${active}</div><div class="stat-lbl">Faol</div></div>
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-val">${newOrders}</div><div class="stat-lbl">Yangi buyurtma</div></div>
        <div class="stat-card"><div class="stat-icon">🎉</div><div class="stat-val">${readyOrders}</div><div class="stat-lbl">Tayyor</div></div>
        <div class="stat-card full"><div class="stat-icon">💰</div><div class="stat-val">${fmt(total)}</div><div class="stat-lbl">Jami tushum</div></div>
        <div class="stat-card full"><div class="stat-icon">📈</div><div class="stat-val">${fmt(todayTotal)}</div><div class="stat-lbl">Bugungi tushum</div></div>
      </div>`;
  }catch(e){el.innerHTML='<div style="color:var(--text2);padding:20px">Xatolik: '+e.message+'</div>';}
}

  if(!confirm('O\'chirishni tasdiqlang?'))return;
  await deleteDoc(doc(db,'orders',id));
  toast('🗑 O\'chirildi');
};

window.setStatus=async(id,status)=>{
  await updateDoc(doc(db,'orders',id),{status});
  toast(`Status: ${STATUS_LABELS[status]}`);
};

/* INIT */
initView();
updateCartUI();
</script>
