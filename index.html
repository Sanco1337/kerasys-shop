<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kerasys Admin Panel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg:#F5FAF6; --bg2:#FFFFFF; --bg3:#EDF7EF; --card:#FFFFFF; --card2:#F0F9F2;
      --accent:#1FA150; --accent-dk:#157A3B; --accent-lt:#E8F7ED; --a2:#FF6B8A;
      --text:#1A2E1D; --text2:#6B8C72; --border:rgba(31,161,80,0.18);
      --shadow:0 2px 16px rgba(31,161,80,0.10); --r:16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    
    .hdr { background:var(--card); padding:14px 16px; border-bottom:1.5px solid var(--border); position:sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
    .logo-tx { font-size:18px; font-weight:900; }
    .logo-tx span { color:var(--accent); }

    .adm-tabs { display:flex; gap:6px; padding:12px; overflow-x:auto; }
    .a-tab { flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); font-size:11px; font-weight:800; cursor:pointer; color:var(--text2); white-space:nowrap; text-align:center; }
    .a-tab.on { background:var(--accent); border-color:var(--accent); color:white; }

    .main { padding:16px; }
    .f-grp { margin-bottom:14px; }
    .f-lbl { font-size:11px; font-weight:800; color:var(--text2); margin-bottom:6px; display:block; text-transform:uppercase; }
    .f-inp, .f-sel, .f-ta { width:100%; padding:12px; border-radius:12px; border:1.5px solid var(--border); background:var(--bg2); font-family:inherit; color:var(--text); outline:none; }
    
    .vars-admin { background:var(--bg3); padding:14px; border-radius:12px; border:1.5px solid var(--border); margin-top:10px; }
    .var-tag { display:inline-flex; align-items:center; gap:5px; background:var(--card); border:1.5px solid var(--border); border-radius:8px; padding:5px 10px; font-size:12px; font-weight:700; margin:3px; }
    .var-tag-del { color:var(--a2); cursor:pointer; font-weight:900; margin-left:5px; }

    .big-btn { width:100%; padding:15px; border:none; border-radius:14px; font-size:16px; font-weight:800; cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent-dk)); color:white; margin-top:10px; }
    
    .adm-p { display:flex; align-items:center; gap:10px; background:var(--card); border-radius:12px; border:1.5px solid var(--border); padding:10px; margin-bottom:8px; }
    .adm-info { flex:1; }
    .adm-name { font-size:13px; font-weight:800; }
    .adm-acts { display:flex; gap:5px; }
    .ia { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; }
    .ia.edit { background:var(--accent-lt); color:var(--accent); }
    .ia.del { background:#fff0f3; color:var(--a2); }

    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:20px; font-size:13px; display:none; z-index:1000; }
    .page { display:none; }
    .page.on { display:block; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="logo-tx">Kerasys <span>Admin</span></div>
  <div id="online-status" style="font-size: 10px; color: var(--accent);"><i class="fa-solid fa-circle"></i> Online</div>
</div>

<div class="adm-tabs">
  <button class="a-tab on" onclick="aTab('products', this)">Mahsulotlar</button>
  <button class="a-tab" onclick="aTab('add', this)">Yangi qo'shish</button>
  <button class="a-tab" onclick="aTab('orders', this)">Buyurtmalar</button>
</div>

<div class="main">
  <div id="products-page" class="page on">
    <div id="products-list"></div>
  </div>

  <div id="add-page" class="page">
    <input type="hidden" id="editId">
    <div class="f-grp">
      <label class="f-lbl">Mahsulot nomi</label>
      <input type="text" id="pName" class="f-inp" placeholder="Masalan: Kerasys Shampun">
    </div>
    <div class="f-grp">
      <label class="f-lbl">Tavsif</label>
      <textarea id="pDesc" class="f-ta" placeholder="Mahsulot haqida ma'lumot"></textarea>
    </div>
    <div class="f-row" style="display:flex; gap:10px; margin-bottom:14px;">
      <div style="flex:1">
        <label class="f-lbl">Asosiy Narx</label>
        <input type="number" id="pPrice" class="f-inp">
      </div>
      <div style="flex:1">
        <label class="f-lbl">Eski Narx</label>
        <input type="number" id="pOld" class="f-inp">
      </div>
    </div>
    <div class="f-grp">
        <label class="f-lbl">Badge (Sale, New)</label>
        <input type="text" id="pBadge" class="f-inp">
    </div>
    <div class="f-grp">
      <label class="f-lbl">Kategoriya</label>
      <select id="pCat" class="f-sel">
        <option value="kukun">Kukunlar</option>
        <option value="shampun">Shampunlar</option>
        <option value="sovun">Sovunlar</option>
      </select>
    </div>
    <div class="f-grp">
      <label class="f-lbl">Rasm URL</label>
      <input type="text" id="pImg" class="f-inp">
    </div>

    <div class="vars-admin">
      <span class="f-lbl">Variantlar (Hajm/Og'irlik)</span>
      <div id="variantTags" class="var-tag-list"></div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="text" id="varInput" class="f-inp" style="flex:2" placeholder="Masalan: 5kg">
        <input type="number" id="varPriceInput" class="f-inp" style="flex:1" placeholder="Narxi">
        <button onclick="addVariant()" class="big-btn" style="margin:0; width:auto; padding:10px 20px;">+</button>
      </div>
    </div>

    <button class="big-btn" onclick="saveProduct()">Saqlash</button>
    <button id="cancelEdit" class="big-btn" style="background:var(--bg3); color:var(--text2); display:none;" onclick="cancelEditFn()">Bekor qilish</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "SIZNING_API_KEY",
    authDomain: "SIZNING_DOMAIN",
    projectId: "SIZNING_PROJECT_ID",
    storageBucket: "...",
    messagingSenderId: "...",
    appId: "..."
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const $ = id => document.getElementById(id);
  const g = id => $(id).value.trim();
  
  let editVars = [];
  let editVarPrices = {};

  // TAB NAVIGATSIYASI
  window.aTab = (id, btn) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.a-tab').forEach(b => b.classList.remove('on'));
    $(id + '-page').classList.add('on');
    btn.classList.add('on');
    if(id === 'products') loadProducts();
  };

  window.toast = (msg) => {
    const t = $('toast'); t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  };

  // VARIANTLAR LOGIKASI
  window.addVariant = () => {
    const v = g('varInput'), p = g('varPriceInput');
    if(!v || !p) return;
    editVars.push(v);
    editVarPrices[v] = parseInt(p);
    $('varInput').value = ''; $('varPriceInput').value = '';
    renderVarTags();
  };

  window.removeVar = (v) => {
    editVars = editVars.filter(i => i !== v);
    delete editVarPrices[v];
    renderVarTags();
  };

  window.renderVarTags = () => {
    $('variantTags').innerHTML = editVars.map(v => `
      <span class="var-tag">${v} (${editVarPrices[v].toLocaleString()}) <span class="var-tag-del" onclick="removeVar('${v}')">×</span></span>
    `).join('');
  };

  // MAHSULOTLARNI YUKLASH
  async function loadProducts() {
    const q = query(collection(db, 'products'), orderBy('timestamp', 'desc'));
    const snap = await getDocs(q);
    let h = '';
    snap.forEach(d => {
      const p = d.data();
      h += `
        <div class="adm-p">
          <div class="adm-info">
            <div class="adm-name">${p.name}</div>
            <div style="font-size:11px; color:var(--accent); font-weight:700;">${p.price.toLocaleString()} so'm</div>
          </div>
          <div class="adm-acts">
            <button class="ia edit" onclick="editP('${d.id}')"><i class="fa-solid fa-pen"></i></button>
            <button class="ia del" onclick="delP('${d.id}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>`;
    });
    $('products-list').innerHTML = h || '<div style="text-align:center; padding:20px; color:var(--text2);">Mahsulotlar yo\'q</div>';
  }

  // TAHRIRLASH REJIMIGA OTISH
  window.editP = async (id) => {
    toast('Yuklanmoqda...');
    const d = await getDoc(doc(db, 'products', id));
    const p = d.data();
    
    $('editId').value = id;
    $('pName').value = p.name;
    $('pDesc').value = p.desc || '';
    $('pPrice').value = p.price;
    $('pOld').value = p.oldPrice || '';
    $('pBadge').value = p.badge || '';
    $('pImg').value = p.img || '';
    $('pCat').value = p.cat;
    
    editVars = [...(p.variants || [])];
    editVarPrices = {...(p.variantPrices || {})};
    renderVarTags();
    
    $('cancelEdit').style.display = 'block';
    aTab('add', document.querySelectorAll('.a-tab')[1]);
  };

  window.cancelEditFn = () => {
    $('editId').value = '';
    ['pName','pDesc','pPrice','pOld','pBadge','pImg'].forEach(id => $(id).value = '');
    editVars = []; editVarPrices = {}; renderVarTags();
    $('cancelEdit').style.display = 'none';
    aTab('products', document.querySelectorAll('.a-tab')[0]);
  };

  // SAQLASH FUNKSIYASI
  window.saveProduct = async () => {
    const name = g('pName'), price = parseInt(g('pPrice'));
    if(!name || !price) return toast('❗ Ism va narxni kiriting');

    const data = {
      name, price,
      desc: g('pDesc'),
      oldPrice: parseInt(g('pOld')) || null,
      badge: g('pBadge'),
      cat: $('pCat').value,
      img: g('pImg'),
      variants: editVars,
      variantPrices: editVarPrices,
      active: true,
      timestamp: new Date()
    };

    const eid = $('editId').value;
    try {
      if(eid) {
        await updateDoc(doc(db, 'products', eid), data);
        toast('✅ Yangilandi');
      } else {
        await addDoc(collection(db, 'products'), data);
        toast('✅ Qo\'shildi');
      }
      cancelEditFn();
    } catch(e) { toast('❌ Xatolik yuz berdi'); }
  };

  window.delP = async id => {
    if(!confirm('O\'chirishni tasdiqlaysizmi?')) return;
    await deleteDoc(doc(db, 'products', id));
    toast('🗑 O\'chirildi');
    loadProducts();
  };

  loadProducts();
</script>

</body>
</html>
